<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Discovery App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="logo">🎬 MovieApp</div>
        <nav class="nav-menu">
            <a href="231A010758_TonGiaLac_KQBAI34.html" target="_blank" class="nav-link">Kết quả Bài 34</a>
            <a href="mota.html" target="_blank" class="nav-link">Mô tả bài làm</a>   
            <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
        </nav>
    </header>

    <div class="app-container">
        <aside class="sidebar">
            <div class="filter-group">
                <h3>Tìm kiếm</h3>
                <input type="text" id="search-input" placeholder="Nhập tên phim...">
            </div>
            
            <div class="filter-group">
                <h3>Thể loại</h3>
                <div id="genre-filters" class="checkbox-list"></div>
            </div>
        </aside>

        <main class="main-content">
            <div id="movie-grid" class="movie-grid">
                </div>
        </main>
    </div>

    <div id="movie-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-body" class="modal-body-grid">
                </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
